    // Copy necessary classes from index.html
    
    // StateManager
    class StateManager {
      constructor() {
        this.state = {
          apiKey: null,
          messages: [],
          currentGeneration: null,
          settingsOpen: false,
          lightboxImage: null
        };
        this.listeners = [];
      }
      
      getState() {
        return { ...this.state };
      }
      
      setState(updates) {
        this.state = { ...this.state, ...updates };
        this.notifyListeners();
      }
      
      subscribe(listener) {
        this.listeners.push(listener);
        return () => {
          this.listeners = this.listeners.filter(l => l !== listener);
        };
      }
      
      notifyListeners() {
        const currentState = this.getState();
        this.listeners.forEach(listener => listener(currentState));
      }
      
      addMessage(message) {
        const messages = [...this.state.messages, message];
        this.setState({ messages });
      }
      
      updateGeneration(updates) {
        if (!this.state.currentGeneration) {
          this.setState({ currentGeneration: updates });
        } else {
          const currentGeneration = { ...this.state.currentGeneration, ...updates };
          this.setState({ currentGeneration });
        }
      }
      
      clearGeneration() {
        this.setState({ currentGeneration: null });
      }
      
      setAPIKey(key) {
        this.setState({ apiKey: key });
      }
    }
